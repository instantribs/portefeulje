<!doctype html>
<html lang="en">
   <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Orders Information</title>
      <link rel="stylesheet" href="../Common_assets/universal_table.css">
   </head>

   <body>
      <h1>Orders Information</h1>
      <p>The current orders are as follows:</p>

      <!-- ================= CRUD form ================= -->

      <div class="form-container">
         <h2>Add / Edit Order</h2>

         <form id="orderForm">
            <input type="hidden" id="editIndex">

            <div class="form-grid">
               <div class="form-field">
                  <label for="product">Product</label>
                  <input type="text" id="product" required>
               </div>

               <div class="form-field">
                  <label for="units">Units</label>
                  <input type="number" id="units" required>
               </div>

               <div class="form-field">
                  <label for="time">Time</label>
                  <input type="datetime-local" id="time" required>
               </div>

               <div class="form-field">
                  <label for="customerName">Name</label>
                  <input type="text" id="customerName" required>
               </div>

               <div class="form-field">
                  <label for="cell">Cell</label>
                  <input type="text" id="cell" required>
               </div>

               <div class="form-field">
                  <label for="address">Address</label>
                  <input type="text" id="address" required>
               </div>

               <div class="form-field">
                  <label for="notes">Notes</label>
                  <textarea id="notes"></textarea>
               </div>
            </div>

            <div class="button-group">
               <button type="submit" class="save-btn">Save Order</button>
               <button type="button" class="cancel-btn" onclick="resetForm()">Cancel Edit</button>
            </div>
         </form>
      </div>

      <!-- ================= tabel ================= -->

      <div class="table-wrapper">
         <table class="universal-table">
            <thead>
               <tr>
                  <th>Product</th>
                  <th>Units</th>
                  <th>Time</th>
                  <th>Name</th>
                  <th>Cell</th>
                  <th>Address</th>
                  <th>Notes</th>
                  <th>Actions</th>
               </tr>
            </thead>

            <tbody id="ordersTableBody"></tbody>
         </table>
      </div>

      <a href="../Portal/portal.html">
         <button class="return-btn">Return To Staff Portal</button>
      </a>

      <script src="orders.js"></script>

   </body>
</html>
